name: 兜夹 Token 自动切换
description: 自动从配置账号中选择 free_times > 0 的账号并保存 access-token；拦截 userapi.cczhua.com 请求时自动注入 Token。脚本本身也支持在 Egern 小组件/通用脚本中手动执行切换。
author: Cline

# 使用说明：
# 1. 将 doujia_token_switch_egern.js 放到 Egern 可访问的位置。
# 2. 如果通过远程模块导入，请把下方 script_url 改为脚本真实 URL。
# 3. 在 Egern 环境变量/脚本参数中配置 DOUJIA_ACCOUNTS，脚本内不保存账密。
#    支持 JSON 数组：[{"phone":"13800138000","password":"password"}]
#    支持多行文本：13800138000#password
# 4. 启用本模块并开启 MITM：userapi.cczhua.com。
# 5. 小组件/通用脚本执行时，选择同一个 doujia_token_switch_egern.js 即可；脚本会返回 title/content/icon/color 供小组件展示。

scriptings:
  - http_request:
      name: 兜夹 Token 注入
      match: ^https?:\/\/userapi\.cczhua\.com\/
      script_url: https://raw.githubusercontent.com/ali0613/ali613/refs/heads/main/doujia_token_switch_egern.js
      body_required: false
      timeout: 30

mitm:
  hostnames:
    includes:
      - userapi.cczhua.com
